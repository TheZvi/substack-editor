<!DOCTYPE html>
<html>
<head>
    <title>Text Transformer Options</title>
    <link rel="stylesheet" type="text/css" href="options.css">
</head>
<body>
    <div class="container">
        <h1>Text Transformer Settings</h1>
        
        <form id="settings-form">
            <!-- API Selection for Text Transform -->
            <div class="form-group">
                <label for="api-select">Text Transform API:</label>
                <select id="api-select">
                    <option value="gemini">Google Gemini</option>
                    <option value="claude">Anthropic Claude</option>
                </select>
                <p style="font-size: 12px; color: #666; margin-top: 4px;">For Ctrl+Q text transformation. Doc Review uses Claude if configured, else Gemini.</p>
            </div>

            <!-- Anthropic Settings -->
            <div class="api-settings" id="claude-settings">
                <h2>Anthropic Claude Settings (Preferred for Doc Review)</h2>
                <div class="form-group">
                    <label for="claude-key">API Key:</label>
                    <input type="password" id="claude-key" />
                    <button type="button" class="show-hide-key">Show/Hide</button>
                </div>
                <div class="form-group">
                    <label for="claude-model">Model:</label>
                    <select id="claude-model">
                        <option value="claude-opus-4-5-20251101">Claude Opus 4.5 (Best)</option>
                        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                        <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                        <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku (Fast)</option>
                    </select>
                </div>
            </div>

            <!-- Gemini Settings -->
            <div class="api-settings" id="gemini-settings">
                <h2>Google Gemini Settings</h2>
                <div class="form-group">
                    <label for="gemini-key">API Key:</label>
                    <input type="password" id="gemini-key" />
                    <button type="button" class="show-hide-key">Show/Hide</button>
                </div>
                <div class="form-group">
                    <label for="gemini-model">Model:</label>
                    <select id="gemini-model">
                        <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite</option>
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    </select>
                </div>
            </div>

            <button type="submit">Save Settings</button>
        </form>
    </div>
    <script src="options.js"></script>
</body>
</html>
