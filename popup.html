<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 10px;
      max-height: 500px;
      overflow-y: auto;
    }
    button {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #status {
      margin-bottom: 10px;
      padding: 8px;
      display: none;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #status.success {
      background-color: #e6ffe6;
      border: 1px solid #99ff99;
    }
    #status.error {
      background-color: #ffe6e6;
      border: 1px solid #ff9999;
    }
    #removal-log {
      margin-top: 10px;
      font-size: 12px;
      display: none;
    }
    #linkify-log {
      margin-top: 10px;
      padding: 5px;
      border: 1px solid #ddd;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    /* New API key section styles */
    .section {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }
    .input-group {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 8px 0;
    }
    .input-group input {
      width: 140px;
    }
    .input-group button {
      min-width: 45px;
      padding: 4px 6px;
    }
    .icon-button {
      min-width: 30px !important;
      padding: 4px !important;
    }
    #api-key-status {
      font-size: 0.9em;
      margin-top: 4px;
    }
    #api-key-status.error {
      color: #d32f2f;
    }
    #api-key-status.success {
      color: #388e3c;
    }
    /* Fix the section header */
    .section h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }
    /* Make the API key inputs not too wide */
    #claude-api-key, #gemini-api-key {
      width: 80px;
    }
    /* Twitter button styling */
    #post-twitter, #sync-twitter-list {
      background: #1DA1F2;
      color: white;
      border: 1px solid #1a91da;
    }
    #post-twitter:hover, #sync-twitter-list:hover {
      background: #1a91da;
    }
    /* Post Workup button styling */
    #post-workup {
      background: #4CAF50;
      color: white;
      border: 1px solid #45a049;
      font-weight: bold;
    }
    #post-workup:hover {
      background: #45a049;
    }
    /* Twitter List Sync section */
    #twitter-sync-section select {
      width: 100%;
      padding: 4px;
      margin: 4px 0;
    }
    #twitter-sync-section .sync-options {
      display: flex;
      gap: 4px;
      margin: 8px 0;
    }
    #twitter-sync-section .sync-options button {
      flex: 1;
      font-size: 11px;
      padding: 6px 2px;
    }
    #twitter-sync-status {
      font-size: 12px;
      margin-top: 8px;
      padding: 5px;
      border-radius: 4px;
      display: none;
    }
    #twitter-sync-status.info {
      background: #e3f2fd;
      border: 1px solid #90caf9;
    }
    #twitter-sync-status.success {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
    }
    #twitter-sync-status.error {
      background: #ffebee;
      border: 1px solid #ef9a9a;
    }
  </style>
</head>
<body>
  <div id="status"></div>
  <button id="post-workup">Post Workup</button>
  <button id="generate-toc">Generate/Update TOC</button>
  <button id="remove-blanks">Remove Blank Sections</button>
  <button id="post-wordpress">Post to WordPress</button>
  <button id="post-twitter">Post to Twitter Article</button>
  <button id="copy-to-googledoc">Copy to Google Doc</button>
  <button id="review-googledoc">Review Google Doc (AI)</button>
  <button id="linkify">Linkify Content</button>
  <button id="manage-linkify-rules">Manage Linkify Rules</button>
  <button id="manage-author-annotations">Manage Author Annotations</button>
  <button id="clean-link-sources">Clean Link Sources</button>

  <div id="twitter-sync-section" class="section">
    <h3>Twitter List Sync</h3>
    <div class="input-group">
      <label for="twitter-username">Username:</label>
      <input type="text" id="twitter-username" placeholder="@username" style="width: 100px;">
      <button id="save-twitter-username">Save</button>
    </div>
    <div class="input-group">
      <label for="twitter-source-list">Source List:</label>
      <input type="text" id="twitter-source-list" placeholder="(empty = Following)" style="width: 100px;">
      <button id="save-source-list">Save</button>
    </div>
    <div class="input-group">
      <label for="twitter-list-id">Dest List:</label>
      <input type="text" id="twitter-list-id" placeholder="List ID" style="width: 100px;">
      <button id="save-twitter-list">Save</button>
    </div>
    <div class="sync-options">
      <button id="sync-add-only" title="Add accounts you follow to the list">Add Only</button>
      <button id="sync-remove-only" title="Remove accounts from list that you don't follow">Remove Only</button>
      <button id="sync-full" title="Make list exactly match your following">Full Sync</button>
    </div>
    <div style="font-size: 11px; color: #666; margin-top: 4px;">
      Source empty = sync from your Following<br>
      Source filled = sync from that list (can be anyone's public list)
    </div>
    <div id="twitter-sync-status"></div>
    <div class="input-group" style="margin-top: 12px; padding-top: 8px; border-top: 1px solid #eee;">
      <label for="twitter-tab-group">Tab Group:</label>
      <input type="text" id="twitter-tab-group" placeholder="AI Links" style="width: 80px;">
      <button id="save-tab-group">Save</button>
    </div>
    <div style="font-size: 11px; color: #666;">
      Ctrl+Q on pro.x.com opens tweet in this tab group
    </div>
  </div>

  <div id="removal-log"></div>
  <div id="linkify-log"></div>
  <div id="api-key-section" class="section">
    <h3>Settings</h3>
    <button id="open-options" style="width: 100%; margin-bottom: 8px;">API Settings (Claude/Gemini)</button>
    <div class="input-group">
      <label for="google-client-secret">Google Secret:</label>
      <input type="password" id="google-client-secret" placeholder="Client secret" style="width: 100px;">
      <button id="save-google-secret">Save</button>
      <button id="show-google-secret" class="icon-button">Show</button>
    </div>
    <button id="reset-google-auth" style="margin-top: 10px; background: #ffebee; border-color: #ef9a9a;">Reset Google Auth</button>
  </div>
  <script src="shared/llm/api/llm-api.js"></script>
  <script src="shared/llm/api/gemini_api.js"></script>
  <script src="shared/google/googledocs-api.js"></script>
  <script src="shared/google/googledocs-review.js"></script>
  <script src="linkify/linkify-controller.js"></script>
  <script src="popup.js"></script>
</body>
</html>
